name: Terraform Deployment

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Plan
  # ─────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS Credentials via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::699200215565:role/github-eks-oidc-role
          aws-region: us-east-1

      # Step 3: Verify AWS Identity
      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      # Step 4: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Step 5: Terraform Init
      - name: Terraform Init
        run: terraform init

      # Step 6: Terraform Validate
      - name: Terraform Validate
        run: terraform validate

      # Step 7: Terraform Plan
      - name: Terraform Plan
        run: terraform plan -out=tfplan.out

      # Step 8: Show Plan Output
      - name: Terraform Show
        run: terraform show -no-color tfplan.out

      # Step 9: Upload plan file to pass to apply job
      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan.out
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Manual Approval Gate
  # ─────────────────────────────────────────
  manual-approval:
    name: Waiting for Approval
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production    # ← This triggers the manual approval

    steps:
      - name: Approval Gate
        run: echo "Approved! Proceeding with Terraform Apply..."

  # ─────────────────────────────────────────
  # JOB 3: Apply
  # ─────────────────────────────────────────
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: manual-approval
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Configure AWS Credentials via OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::699200215565:role/github-eks-oidc-role
          aws-region: us-east-1


      # Step 3: Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      # Step 4: Terraform Init
      - name: Terraform Init
        run: terraform init

      # Step 5: Download Plan from Plan Job
      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      # Step 6: Terraform Apply
      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan.out
